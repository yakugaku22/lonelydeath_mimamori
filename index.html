<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みまもりアプリ</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <main class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">🌸</div>
        <h1 class="app-title">みまもりアプリ</h1>
        <p class="app-subtitle">孤独死ゼロを目指して、みんなで見守ろう</p>
      </div>

      <div class="welcome-badge">
        <span>ようこそ！！</span>
      </div>

      <p class="role-prompt">あなたの立場を選択してください</p>

      <div class="role-buttons">
        <button class="role-btn patient-btn" onclick="goTo('patient')">
          <span class="btn-icon">😊</span>
          <span class="btn-main">見守られる側</span>
          <span class="btn-sub">当事者の方</span>
          <span class="btn-arrow">→</span>
        </button>

        <button class="role-btn watcher-btn" onclick="goTo('watcher')">
          <span class="btn-icon">👨‍👩‍👧</span>
          <span class="btn-main">見守る側</span>
          <span class="btn-sub">家族・その他の方</span>
          <span class="btn-arrow">→</span>
        </button>

        <button class="role-btn medical-btn" onclick="goTo('medical')">
          <span class="btn-icon">🏥</span>
          <span class="btn-main">医療関係者</span>
          <span class="btn-sub">かかりつけ医など（任意）</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>

      <!-- 設定状況バッジ -->
      <div class="setup-status" id="setupStatus"></div>

      <p class="footer-note">💡 初回設定は後からでも変更できます</p>

      <!-- リセットボタン -->
      <div class="reset-area" id="resetArea" style="display:none;">
        <button class="reset-all-btn" onclick="confirmReset()">
          🔄 全ての設定をリセット
        </button>
      </div>
    </div>
  </main>

  <!-- リセット確認モーダル -->
  <div class="modal-overlay" id="resetModal" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon" id="resetModalIcon">⚠️</div>
      <h3 class="modal-title" id="resetModalTitle">設定をリセットしますか？</h3>
      <p class="modal-desc" id="resetModalDesc">保存されている設定情報が削除されます。</p>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="modal-confirm" onclick="executeReset()">リセットする</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="index.js"></script>
</body>
</html>
