<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みまもりアプリ｜今日の体調</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="patient.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <main class="page-container">
    <div class="page-card">
      <!-- ヘッダー -->
      <header class="page-header">
        <button class="back-btn" onclick="window.location.href='index.html'">← もどる</button>
        <span class="header-badge patient-badge">見守られる側</span>
        <button class="profile-btn patient-profile-btn" onclick="togglePairCode()" id="pairCodeToggleBtn">🔗 コード確認</button>
      </header>

      <!-- ペアリングコード表示パネル -->
      <div class="pair-code-panel hidden" id="pairCodePanel">
        <div class="pair-code-panel-inner">
          <p class="pair-code-panel-title">🔗 あなたのペアリングコード</p>
          <div class="pair-code-display-lg" id="pairCodeDisplay">-</div>
          <p class="pair-code-panel-desc">このコードを<strong>家族・支援者</strong>や<strong>かかりつけ医</strong>に伝えてください</p>
          <div class="pair-share-tags">
            <span class="pair-tag">👨‍👩‍👧 見守る側</span>
            <span class="pair-tag">🏥 医療関係者</span>
          </div>
        </div>
      </div>

      <!-- 医師からの通知バナー -->
      <div class="alert-banner medical-notify-banner" id="patientMedicalBanner" style="display:none;">
        <span class="alert-icon">🏥</span>
        <div>
          <p class="alert-title" id="patientMedicalSender"></p>
          <p class="alert-sub"   id="patientMedicalText"></p>
        </div>
      </div>

      <!-- 挨拶 -->
      <section class="greeting-section">
        <div class="greeting-icon">🌞</div>
        <h2 class="greeting-name" id="patientName"></h2>
        <p class="greeting-text">おはようございます！<br />今日の体調はいかがですか？</p>
      </section>

      <!-- 体調選択 -->
      <section class="health-section">
        <p class="health-prompt">今日の体調は？</p>
        <div class="health-buttons" id="healthButtons">
          <button class="health-btn" data-status="great" onclick="selectHealth(this)">
            <span class="health-emoji">😊</span>
            <span class="health-label">元気</span>
          </button>
          <button class="health-btn" data-status="good" onclick="selectHealth(this)">
            <span class="health-emoji">🙂</span>
            <span class="health-label">そこそこ元気</span>
          </button>
          <button class="health-btn" data-status="bad" onclick="selectHealth(this)">
            <span class="health-emoji">😟</span>
            <span class="health-label">少し体調悪い</span>
          </button>
          <button class="health-btn" data-status="sick" onclick="selectHealth(this)">
            <span class="health-emoji">😢</span>
            <span class="health-label">体調が悪い</span>
          </button>
        </div>
      </section>

      <!-- 送信後メッセージ（初期は非表示） -->
      <section class="result-section" id="resultSection" style="display:none;">
        <div class="result-card" id="resultCard">
          <div class="result-emoji" id="resultEmoji"></div>
          <p class="result-message" id="resultMessage"></p>
          <p class="result-sub" id="resultSub"></p>
        </div>
        <button class="reset-btn" id="resetBtn" onclick="resetSelection()">もう一度答える</button>
      </section>
    </div>
  </main>

  <script src="main.js"></script>
  <script src="patient.js"></script>
</body>
</html>
