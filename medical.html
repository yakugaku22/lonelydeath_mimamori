<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みまもりアプリ｜医療関係者</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="patient.css" />
  <link rel="stylesheet" href="medical.css" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1" style="background: var(--blue);"></div>
    <div class="blob blob2" style="background: var(--teal);"></div>
    <div class="blob blob3" style="background: var(--green);"></div>
  </div>

  <main class="page-container">
    <div class="page-card">

      <!-- ヘッダー -->
      <header class="page-header">
        <button class="back-btn" onclick="goBackToList()">← もどる</button>
        <span class="header-badge medical-badge">医療関係者</span>
      </header>

      <!-- 一覧画面 -->
      <div id="listView">
        <section class="medical-title-section">
          <div class="greeting-icon">🏥</div>
          <h2 class="greeting-name">登録者一覧</h2>
          <p class="greeting-text" id="medicalName"></p>
          <button class="add-patient-btn" onclick="openAddModal()">＋ 患者を追加</button>
        </section>

        <!-- 今日のステータスバナー -->
        <div class="today-status-banner" id="todayStatusBanner">
          <span class="tsb-label">今日のステータス（最新患者）</span>
          <div class="tsb-content">
              <span class="tsb-text"  id="tsbText">未報告</span>
          </div>
        </div>

        <!-- 検索 -->
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="患者検索..." oninput="filterPatients()" />
        </div>

        <!-- 患者一覧（localStorageから動的生成） -->
        <div class="patient-list" id="patientList"></div>
      </div>

      <!-- 詳細画面 -->
      <div id="detailView" style="display:none;">
        <section class="detail-header-section">
          <div class="detail-name-row">
            <span class="detail-emoji" id="detailEmoji"></span>
            <h2 class="detail-name" id="detailName"></h2>
          </div>
          <span class="detail-status-badge" id="detailStatusBadge"></span>
        </section>

        <!-- 今日のステータスバナー（詳細） -->
        <div class="today-status-banner" id="detailStatusBanner">
          <span class="tsb-label">今日のステータス</span>
          <div class="tsb-content">
            <span class="tsb-text"  id="detailTsbText">未報告</span>
          </div>
        </div>

        <!-- 来院・処方カード（動的描画） -->
        <div class="detail-cards" id="hospitalCards"></div>

        <!-- 入力フォーム -->
        <div class="edit-section">
          <p class="edit-title">✏️ 来院情報を入力・更新</p>
          <div class="edit-form">
            <div class="edit-field">
              <label>医療機関名</label>
              <input type="text" id="editHospital" placeholder="例：〇〇内科クリニック" />
            </div>
            <div class="edit-field">
              <label>来院日</label>
              <input type="date" id="editVisitDate" />
            </div>
            <div class="edit-field">
              <label>処方薬</label>
              <input type="text" id="editMedicine" placeholder="薬名を入力..." />
            </div>
            <div class="edit-field">
              <label>家族への伝達事項（任意）</label>
              <input type="text" id="editMessage" placeholder="伝達事項がある場合のみ入力..." />
            </div>
            <button class="save-btn" onclick="saveRecord()">保存する</button>
          </div>
          <p class="edit-note">※ 伝達事項がある場合のみ、見守る側に通知が届きます</p>
        </div>
      </div>

    </div>
  </main>

  <!-- 患者追加モーダル -->
  <div class="modal-overlay" id="addPatientModal" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon">🔗</div>
      <h3 class="modal-title">患者を追加</h3>
      <p class="modal-desc">患者の方のペアリングコードを入力してください</p>
      <input type="text" id="addPairCode" class="form-input code-input"
             placeholder="例：yamada2026" maxlength="20"
             style="margin-bottom:12px; font-family:inherit;" />
      <div class="add-patient-result hidden" id="addPatientResult"></div>
      <div class="modal-btns" style="margin-top:16px;">
        <button class="modal-cancel" onclick="closeAddModal()">キャンセル</button>
        <button class="modal-confirm" onclick="executeAddPatient()">追加する</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="medical.js"></script>
</body>
</html>
